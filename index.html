<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الاتصال Supabase</title>
</head>
<body>
<h2>اختبار الاتصال بـ Supabase</h2>
<p id="status">الحالة: جاري الاتصال...</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://aeuprfdpiumdhuceuklj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_CpkeH3iIXirmlRg8CtzX4Q_RQ97jDdq";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const statusEl = document.getElementById("status");

(async () => {
    try {
        // فقط اختبار الوصول للـ Bucket
        const { data, error } = await supabase.storage.from("videos").list({ limit:1 });
        if(error) throw error;
        statusEl.innerText = "✅ الاتصال ناجح! يمكن الوصول إلى الـ Bucket.";
        console.log("Connection successful:", data);
    } catch(e) {
        statusEl.innerText = "❌ فشل الاتصال: " + e.message;
        console.error("Connection error:", e);
    }
})();
</script>
</body>
</html>
